<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sem conexão — Impulsionando</title>
<link rel="icon" href="/pwa-icon-192.png" />
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #0F172A; color: #fff; margin: 0;
         min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { max-width: 480px; text-align: center; }
  h1 { font-size: 1.5rem; margin: 1rem 0 .5rem; }
  p { opacity: .8; line-height: 1.5; }
  button { margin-top: 1.5rem; background: #3B82F6; color: #fff; border: 0;
           padding: .75rem 1.5rem; border-radius: .5rem; font-weight: 600; cursor: pointer; }
  img { width: 96px; height: 96px; }
</style>
</head>
<body>
  <div class="card">
    <img src="/pwa-icon-192.png" alt="Impulsionando" />
    <h1>Você está offline</h1>
    <p>Não conseguimos carregar este conteúdo agora. Verifique sua conexão e tente novamente.</p>
    <button onclick="location.reload()">Tentar de novo</button>
  </div>
</body>
</html>
