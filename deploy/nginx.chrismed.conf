server {
  listen 80;
  listen [::]:80;
  server_name chrismed.impulsionando.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name chrismed.impulsionando.com.br;

  ssl_certificate /etc/letsencrypt/live/chrismed.impulsionando.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chrismed.impulsionando.com.br/privkey.pem;

  access_log /var/log/nginx/chrismed.impulsionando.access.log;
  error_log /var/log/nginx/chrismed.impulsionando.error.log warn;

  location /_build/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
  }
}
