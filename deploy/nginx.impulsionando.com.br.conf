# Nginx reverse proxy for the Core Impulsionando TanStack Start/Nitro app.
# The application is built by `npm run build` and served by Node from
# `.output/server/index.mjs` on 127.0.0.1:3000.
#
# Recommended Cloudflare mode: Full (strict) after installing a valid
# certificate on the VPS/Hostinger origin. Do not use Flexible.

server {
  listen 80;
  listen [::]:80;
  server_name www.impulsionando.com.br;

  return 301 https://impulsionando.com.br$request_uri;
}

server {
  listen 80;
  listen [::]:80;
  server_name impulsionando.com.br;

  # If certbot/http-01 is used, keep this location before the redirect.
  location /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  location / {
    return 301 https://impulsionando.com.br$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.impulsionando.com.br;

  ssl_certificate /etc/letsencrypt/live/impulsionando.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/impulsionando.com.br/privkey.pem;

  return 301 https://impulsionando.com.br$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name impulsionando.com.br;

  ssl_certificate /etc/letsencrypt/live/impulsionando.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/impulsionando.com.br/privkey.pem;

  access_log /var/log/nginx/impulsionando.access.log;
  error_log /var/log/nginx/impulsionando.error.log warn;

  # Static assets emitted by Nitro/Vite. Keep these cacheable and proxy all
  # other requests to Node so SSR routes and direct refreshes do not 404.
  location /_build/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
  }
}
