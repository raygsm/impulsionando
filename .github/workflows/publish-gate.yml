name: Publish Gate

# Blocks publishing (deploy) when security checks, RLS tests, or production
# build fail. Required status check on protected branches.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-security-gate:
    name: Production build + security gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Production build (must succeed)
        run: bun run build

      - name: Run RLS / permission tests
        id: rls
        run: bunx vitest run tests/rls-permission-hardening.test.ts tests/rls-exports-isolation.test.ts tests/audit-denied-exports.test.ts --reporter=verbose 2>&1 | tee rls-report.txt
        continue-on-error: false

      - name: Security scan (Supabase linter)
        id: secscan
        run: |
          set -e
          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            npx -y supabase@latest db lint --project-ref "$SUPABASE_PROJECT_ID" --linter security 2>&1 | tee security-report.txt
          else
            echo "Supabase credentials not available; skipping remote lint (local migration check only)." | tee security-report.txt
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Smoke test public routes (preview URL)
        if: github.event_name == 'pull_request'
        run: |
          set -e
          BASE="https://id-preview--d5a31290-577c-4ca5-895e-72d4b8643439.lovable.app"
          for p in / /clube /consumidor /planos /white-label; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L "$BASE$p")
            echo "$code $p"
            if [ "$code" != "200" ] && [ "$code" != "302" ]; then
              echo "::error::Route $p returned HTTP $code"
              exit 1
            fi
          done

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-gate-reports
          path: |
            rls-report.txt
            security-report.txt
          retention-days: 30

      - name: Fail if any check failed
        if: failure()
        run: |
          echo "::error::Publish gate FAILED — publishing is blocked until build, RLS tests, and security scan pass."
          exit 1
