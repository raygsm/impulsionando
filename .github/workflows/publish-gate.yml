name: Publish Gate

# Blocks publishing (deploy) when security checks, RLS tests, or production
# build fail. Required status check on protected branches.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-security-gate:
    name: Production build + security gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL || vars.SMOKE_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify Supabase target
        run: node scripts/verify-supabase-target.mjs

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Production build (must succeed)
        run: bun run build

      - name: Run RLS / permission tests
        id: rls
        run: bunx vitest run tests/rls-permission-hardening.test.ts tests/rls-exports-isolation.test.ts tests/audit-denied-exports.test.ts --reporter=verbose 2>&1 | tee rls-report.txt
        continue-on-error: false

      - name: Security scan (Supabase linter)
        id: secscan
        run: |
          set -e
          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            npx -y supabase@latest db lint --project-ref "$SUPABASE_PROJECT_ID" --linter security 2>&1 | tee security-report.txt
          else
            echo "Supabase credentials not available; skipping remote lint (local migration check only)." | tee security-report.txt
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ env.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ env.SUPABASE_PROJECT_ID }}

      - name: Smoke test public routes
        if: github.event_name == 'pull_request'
        run: |
          set -e
          if [ -z "${SMOKE_BASE_URL:-}" ]; then
            echo "::notice::SMOKE_BASE_URL not configured; skipping public route smoke test."
            exit 0
          fi
          BASE="${SMOKE_BASE_URL%/}"
          for p in / /clube /consumidor /planos /white-label; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L "$BASE$p")
            echo "$code $p"
            if [ "$code" != "200" ] && [ "$code" != "302" ]; then
              echo "::error::Route $p returned HTTP $code"
              exit 1
            fi
          done

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-gate-reports
          path: |
            rls-report.txt
            security-report.txt
          retention-days: 30

      - name: Fail if any check failed
        if: failure()
        run: |
          echo "::error::Publish gate FAILED — publishing is blocked until build, RLS tests, and security scan pass."
          exit 1
