name: security-rls

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-rls-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls-suite:
    name: Security scan + RLS regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Verify required secrets
        run: |
          missing=0
          for v in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then echo "::error::Missing secret: $v"; missing=1; fi
          done
          test "$missing" = "0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare results dir
        run: mkdir -p test-results

      - name: Supabase DB linter (ERROR + WARN)
        id: linter
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_ID != ''
        continue-on-error: true
        run: |
          set -o pipefail
          bunx supabase@latest --version
          # ERROR level fails the job; WARN is informational
          bunx supabase@latest db lint --project-id "$SUPABASE_PROJECT_ID" --level error \
            2>&1 | tee test-results/db-lint-errors.txt
          bunx supabase@latest db lint --project-id "$SUPABASE_PROJECT_ID" --level warn \
            2>&1 | tee test-results/db-lint-warn.txt || true

      - name: RLS regression suite (vitest)
        id: rls
        run: |
          set -o pipefail
          bunx vitest run \
            tests/rls-permission-hardening.test.ts \
            tests/rls-contab-rules-isolation.test.ts \
            tests/rls-contracts-isolation.test.ts \
            tests/rls-permissions.test.ts \
            tests/rls-exports-isolation.test.ts \
            --reporter=verbose --reporter=junit \
            --outputFile=test-results/rls.junit.xml 2>&1 | tee test-results/rls.log

      - name: Snapshot recent denials (last 25 audit_logs rows)
        if: always() && env.SUPABASE_DB_PASSWORD != ''
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -n "${{ secrets.SUPABASE_DB_HOST }}" ]; then
            psql "postgres://postgres:${PGPASSWORD}@${{ secrets.SUPABASE_DB_HOST }}:5432/postgres" \
              -c "SELECT created_at, action, entity, company_id, user_id, metadata FROM audit_logs WHERE action IN ('security.access_denied','realestate.interest.rate_limited') ORDER BY created_at DESC LIMIT 25;" \
              > test-results/audit_tail.txt 2>&1 || echo "snapshot skipped" > test-results/audit_tail.txt
          fi

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Security scan + RLS regression"
            echo "| Suite | Outcome |"
            echo "|---|---|"
            echo "| supabase db lint (error) | ${{ steps.linter.outcome }} |"
            echo "| rls regression | ${{ steps.rls.outcome }} |"
            echo ""
            echo "### DB linter errors (tail)"
            echo '```'; tail -n 80 test-results/db-lint-errors.txt 2>/dev/null || echo "no output"; echo '```'
            echo "### RLS log (tail)"
            echo '```'; tail -n 120 test-results/rls.log 2>/dev/null || echo "no log"; echo '```'
            echo "### Recent denials"
            echo '```'; cat test-results/audit_tail.txt 2>/dev/null || echo "no snapshot"; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-rls-results
          path: test-results
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail job if any required step failed
        if: always()
        run: |
          fail=0
          # The DB linter "error" run is required when the secrets are present.
          if [ "${{ steps.linter.outcome }}" = "failure" ]; then fail=1; fi
          if [ "${{ steps.rls.outcome }}" != "success" ]; then fail=1; fi
          test "$fail" = "0" || { echo "::error::security-rls failed"; exit 1; }
