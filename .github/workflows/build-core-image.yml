name: Build Core Docker Image
run-name: Build Core Docker Image - ${{ github.ref_name }} @ ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/security-autonomy-audit
    paths:
      - Dockerfile
      - package.json
      - bun.lock
      - app/**
      - components/**
      - composables/**
      - content/**
      - layouts/**
      - lib/**
      - middleware/**
      - modules/**
      - pages/**
      - plugins/**
      - public/**
      - server/**
      - scripts/start-hostinger.mjs
      - deploy/hostinger/**
      - src/**
      - stores/**
      - utils/**
      - nuxt.config.*
      - vite.config.*
      - tailwind.config.*
      - tsconfig.json
      - .github/workflows/build-core-image.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/raygsm/impulsionando-core
  SUPABASE_URL: https://arygtqrdpcdkwnuwsgmm.supabase.co
  SUPABASE_PUBLISHABLE_KEY: sb_publishable_2LwKeCKN7nZccPxZeHp36w_4Rbfx2JX

jobs:
  build:
    name: Build and publish Core image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate official Core Supabase target
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_PUBLISHABLE_KEY"
          case "$SUPABASE_URL" in
            https://arygtqrdpcdkwnuwsgmm.supabase.co) ;;
            *) echo "::error::SUPABASE_URL must point to the official Core project arygtqrdpcdkwnuwsgmm"; exit 1 ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:security-autonomy-audit
            ${{ env.IMAGE_NAME }}:hostinger-stable
            ${{ env.IMAGE_NAME }}:hostinger-verified
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            APP_BASE_URL=https://app.impulsionando.com.br
            PUBLIC_APP_URL=https://app.impulsionando.com.br
            PUBLIC_SITE_URL=https://impulsionando.com.br
            SITE_URL=https://impulsionando.com.br
            VITE_PUBLIC_SITE_URL=https://impulsionando.com.br
            SUPABASE_URL=${{ env.SUPABASE_URL }}
            SUPABASE_PUBLISHABLE_KEY=${{ env.SUPABASE_PUBLISHABLE_KEY }}
            SUPABASE_ANON_KEY=${{ env.SUPABASE_PUBLISHABLE_KEY }}
            VITE_SUPABASE_URL=${{ env.SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ env.SUPABASE_PUBLISHABLE_KEY }}
            IMPULSIONANDO_IMAGE_VERSION=${{ github.sha }}

      - name: Verify image is Core runtime, not nginx placeholder
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${IMAGE_NAME}:${GITHUB_SHA}"
          docker rm -f impulsionando-core-smoke 2>/dev/null || true
          docker run -d --name impulsionando-core-smoke -p 127.0.0.1:3000:3000 "$IMAGE"

          cleanup() {
            docker logs impulsionando-core-smoke || true
            docker rm -f impulsionando-core-smoke 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3000/__impulsionando-runtime > runtime.json; then
              break
            fi
            sleep 2
          done

          cat runtime.json
          grep -q '"runtime": "impulsionando-core-bun"' runtime.json

          curl -fsS http://127.0.0.1:3000/health > health.txt
          cat health.txt
          grep -q 'runtime=impulsionando-core-bun' health.txt

          curl -fsS http://127.0.0.1:3000/ > index.html || true
          if grep -qiE 'Welcome to nginx|Thank you for using nginx|nginx\.org' index.html; then
            echo "::error::Verified image is still serving the nginx default page."
            exit 1
          fi

          echo "Verified $IMAGE: Core Bun runtime is active and nginx placeholder is absent."

      - name: Push verified image tags
        shell: bash
        run: |
          set -euo pipefail
          for tag in security-autonomy-audit hostinger-stable hostinger-verified "${GITHUB_SHA}"; do
            docker push "${IMAGE_NAME}:${tag}"
          done
