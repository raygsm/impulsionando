name: Build Core Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - pnpm-lock.yaml
      - bun.lock
      - src/**
      - public/**
      - scripts/**
      - vite.config.*
      - tsconfig.json
      - .github/workflows/build-core-image.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/raygsm/impulsionando-core

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug build output
        run: |
          npm ci
          npm run build
          echo "ROOT:"
          ls -lah
          echo "DIST:"
          ls -lah dist || true
          echo "DIST SERVER:"
          ls -lah dist/server || true
          echo "OUTPUT:"
          ls -lah .output || true
          echo "BUILD:"
          ls -lah build || true
          echo "TANSTACK:"
          ls -lah .tanstack || true
          echo "VINXI:"
          ls -lah .vinxi || true
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:hostinger-verified
            ${{ env.IMAGE_NAME }}:hostinger-stable
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_PUBLIC_SITE_URL=https://impulsionando.com.br
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
