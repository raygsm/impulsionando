name: Deploy Core Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src/**
      - public/**
      - scripts/**
      - vite.config.*
      - tsconfig*.json
      - deploy/**
      - .github/workflows/deploy-core-frontend.yml

concurrency:
  group: deploy-core-frontend
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build TanStack Start app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Test tenant domain routing
        run: npx vitest run src/lib/subdomain.test.ts

      - name: Build
        run: npm run build
        env:
          VITE_PUBLIC_SITE_URL: https://impulsionando.com.br
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Verify server output
        run: |
          test -f .output/server/index.mjs
          test -d .output/public

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: impulsionando-core-output
          path: |
            .output
            package.json
            package-lock.json
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Publish to Hostinger
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: impulsionando-core-output
          path: release

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release and server configuration
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          RELEASE_DIR="/var/www/impulsionando-core/releases/${GITHUB_SHA}"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${RELEASE_DIR}'"
          rsync -az --delete release/ "${DEPLOY_USER}@${DEPLOY_HOST}:${RELEASE_DIR}/"
          scp deploy/impulsionando-core.service "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/impulsionando-core.service"
          scp deploy/nginx.chrismed.http.conf "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/nginx.chrismed.http.conf"
          scp deploy/nginx.chrismed.conf "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/nginx.chrismed.conf"

      - name: Activate release and CHRISMED domain
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          RELEASE_DIR="/var/www/impulsionando-core/releases/${GITHUB_SHA}"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "RELEASE_DIR='${RELEASE_DIR}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$RELEASE_DIR"
          npm ci --omit=dev --no-audit --no-fund
          ln -sfn "$RELEASE_DIR" /var/www/impulsionando-core/current

          sudo install -m 0644 /tmp/impulsionando-core.service /etc/systemd/system/impulsionando-core.service
          sudo systemctl daemon-reload
          sudo systemctl enable impulsionando-core
          sudo systemctl restart impulsionando-core

          sudo install -d -m 0755 /var/www/letsencrypt
          sudo install -m 0644 /tmp/nginx.chrismed.http.conf /etc/nginx/sites-available/chrismed.impulsionando.com.br
          sudo ln -sfn /etc/nginx/sites-available/chrismed.impulsionando.com.br /etc/nginx/sites-enabled/chrismed.impulsionando.com.br
          sudo nginx -t
          sudo systemctl reload nginx

          if [ ! -f /etc/letsencrypt/live/chrismed.impulsionando.com.br/fullchain.pem ]; then
            if ! command -v certbot >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y certbot
            fi
            sudo certbot certonly --webroot --webroot-path /var/www/letsencrypt \
              --non-interactive --agree-tos --email sac@impulsionando.com.br \
              -d chrismed.impulsionando.com.br
          fi

          sudo install -m 0644 /tmp/nginx.chrismed.conf /etc/nginx/sites-available/chrismed.impulsionando.com.br
          sudo nginx -t
          sudo systemctl reload nginx
          REMOTE

      - name: Validate public frontends
        run: |
          curl --fail --location --silent --show-error --max-time 30 https://impulsionando.com.br/ >/tmp/impulsionando.html
          curl --fail --location --silent --show-error --max-time 30 https://chrismed.impulsionando.com.br/ >/tmp/chrismed.html
          grep -qi "Impulsionando" /tmp/impulsionando.html
          grep -qi "CHRISMED" /tmp/chrismed.html
