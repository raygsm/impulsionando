name: e2e

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Avoid piling up runs on the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (admin logo audit)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      # --- Build-time (Vite client bundle) ---
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      # --- Runtime (server functions) ---
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # --- E2E credentials (test account on the staging backend) ---
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      # Optional override: point at an external preview deploy instead of
      # building locally. When set, Playwright skips its own webServer.
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      # Enable visual-regression snapshots when the repo variable is set.
      # The reducedMotion / RTL snapshot scenarios skip themselves on CI unless
      # this is "1" so the first run can produce baselines without failing.
      E2E_VISUAL: ${{ vars.E2E_VISUAL }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sanity-check required secrets
        run: |
          missing=0
          for var in VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY E2E_EMAIL E2E_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          test "$missing" = "0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run admin E2E suite
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14
          if-no-files-found: ignore

      # When a visual-regression test fails, Playwright writes
      # `*-expected.png`, `*-actual.png`, and `*-diff.png` into
      # `test-results/<test>/`. Upload them as a dedicated artifact so
      # diffs are one click away from the failed run.
      - name: Upload visual-diff PNGs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-diffs
          path: |
            test-results/**/*-expected.png
            test-results/**/*-actual.png
            test-results/**/*-diff.png
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results/**/trace.zip
            test-results/**/video.webm
          retention-days: 14
          if-no-files-found: ignore
