name: e2e

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Avoid piling up runs on the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E + a11y + visual (Chromium / Firefox / WebKit · desktop+mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    env:
      CI: "true"
      # --- Build-time (Vite client bundle) ---
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      # --- Runtime (server functions) ---
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # --- E2E credentials (test account on the staging backend) ---
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      # Optional override: point at an external preview deploy instead of
      # building locally. When set, Playwright skips its own webServer.
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      # Enable visual-regression snapshots when the repo variable is set.
      # The reducedMotion / RTL snapshot scenarios skip themselves on CI unless
      # this is "1" so the first run can produce baselines without failing.
      E2E_VISUAL: ${{ vars.E2E_VISUAL }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sanity-check required secrets
        run: |
          missing=0
          for var in VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY E2E_EMAIL E2E_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          test "$missing" = "0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Bump key whenever we add/remove engines (chromium+firefox+webkit).
          key: pw-cfw-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}

      - name: Install Playwright browsers (Chromium + Firefox + WebKit)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium firefox webkit

      # Roda a matriz inteira definida em playwright.config.ts:
      # desktop-{chromium,firefox,webkit} + mobile-{chromium,webkit,firefox}.
      # Inclui specs de funil (e2e/nichos-funnel.spec.ts), visual regression
      # (e2e/hero-cta-visual.spec.ts, e2e/escolher-nicho-visual.spec.ts) e
      # auditoria axe (e2e/nichos-a11y.spec.ts — falha em violação critical).
      - name: Run Playwright suite (all engines · desktop+mobile)
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14
          if-no-files-found: ignore

      # When a visual-regression test fails, Playwright writes
      # `*-expected.png`, `*-actual.png`, and `*-diff.png` into
      # `test-results/<test>/`. Upload them as a dedicated artifact so
      # diffs are one click away from the failed run.
      - name: Upload visual-diff PNGs (on failure)
        if: failure()
        id: upload-visual-diffs
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-diffs
          path: |
            test-results/**/*-expected.png
            test-results/**/*-actual.png
            test-results/**/*-diff.png
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright traces, videos & DOM snapshots (on failure)
        if: failure()
        id: upload-traces
        uses: actions/upload-artifact@v4
        with:
          # Inclui:
          #  - trace.zip          → trace viewer com DOM snapshots por ação
          #  - video.webm         → vídeo da execução
          #  - test-failed-*.png  → screenshot do estado final
          #  - error-context.md   → contexto de DOM ao redor do locator falho
          #  - *.html             → dumps de DOM eventualmente anexados
          name: playwright-traces
          path: |
            test-results/**/trace.zip
            test-results/**/video.webm
            test-results/**/test-failed-*.png
            test-results/**/error-context.md
            test-results/**/*.html
          retention-days: 14
          if-no-files-found: ignore


      # Gera relatório agrupando diffs por componente × viewport × estado
      # (verticalOffer educacao, PublicFooter, Hero CTAs, etc.) e
      # publica no Job Summary + expõe como output para o comentário.
      - name: Generate visual regression report
        if: always()
        id: visual-report
        run: node scripts/playwright-visual-report.mjs test-results

      # Comment on the PR with direct links to the uploaded artifacts so
      # reviewers can fetch expected/actual/diff PNGs and traces in one click.
      # Only runs on pull_request events and only when something failed.
      - name: Comment PR with visual diff + trace links
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DIFF_URL: ${{ steps.upload-visual-diffs.outputs.artifact-url }}
          TRACE_URL: ${{ steps.upload-traces.outputs.artifact-url }}
          REPORT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VISUAL_ENABLED: ${{ vars.E2E_VISUAL }}
          VISUAL_REPORT: ${{ steps.visual-report.outputs.report }}
          DIFF_COUNT: ${{ steps.visual-report.outputs.diff_count }}
        with:
          script: |
            const { DIFF_URL, TRACE_URL, REPORT_URL, VISUAL_ENABLED, VISUAL_REPORT, DIFF_COUNT } = process.env;
            const lines = [
              "### ❌ Playwright E2E falhou",
              "",
              `- 📄 [Run completo](${REPORT_URL})`,
            ];
            if (DIFF_URL) {
              lines.push(`- 🖼️ [Visual diffs (expected / actual / diff PNGs)](${DIFF_URL})`);
            }
            if (TRACE_URL) {
              lines.push(`- 🎞️ [Traces & vídeos](${TRACE_URL}) — abra com \`bunx playwright show-trace trace.zip\``);
            }
            if (VISUAL_ENABLED === "1" && !DIFF_URL) {
              lines.push("- ℹ️ Nenhum PNG de diff foi gerado — provável falha não-visual.");
            }
            if (VISUAL_ENABLED !== "1") {
              lines.push("");
              lines.push("> 💡 Os cenários de visual regression só rodam com `E2E_VISUAL=1` (Settings → Variables).");
            }
            if (VISUAL_REPORT && Number(DIFF_COUNT ?? 0) > 0) {
              lines.push("");
              lines.push("<details><summary>📊 Relatório de visual regression (viewport × estado)</summary>");
              lines.push("");
              lines.push(VISUAL_REPORT);
              lines.push("</details>");
            }
            lines.push("");
            lines.push("Como interpretar os PNGs em `playwright-visual-diffs`:");
            lines.push("");
            lines.push("- `*-expected.png` — baseline commitado no repo.");
            lines.push("- `*-actual.png` — o que o teste capturou nesta run.");
            lines.push("- `*-diff.png` — pixels divergentes em vermelho. Se a mudança for intencional, regenere os baselines (ver `tests/e2e/README.md`).");
            const body = lines.join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

