name: tenant-isolation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tenant-isolation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest-isolation:
    name: Tenant isolation + email delivery (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify required secrets
        run: |
          missing=0
          for v in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          test "$missing" = "0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tenant isolation E2E
        id: isolation
        run: |
          set -o pipefail
          bunx vitest run tests/e2e/tenant-isolation.test.ts --reporter=verbose --reporter=junit --outputFile=test-results/isolation.junit.xml 2>&1 | tee test-results/isolation.log

      - name: Run contract email delivery E2E
        id: email
        if: always()
        run: |
          set -o pipefail
          bunx vitest run tests/e2e/contract-email-delivery.test.ts --reporter=verbose --reporter=junit --outputFile=test-results/email.junit.xml 2>&1 | tee test-results/email.log

      - name: Publish summary
        if: always()
        run: |
          echo "## Tenant isolation E2E" >> "$GITHUB_STEP_SUMMARY"
          echo "- isolation status: ${{ steps.isolation.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- email delivery status: ${{ steps.email.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Isolation log (tail)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 80 test-results/isolation.log 2>/dev/null || echo "no log"  >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "### Email log (tail)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 80 test-results/email.log 2>/dev/null || echo "no log" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tenant-isolation-results
          path: test-results
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail job if any suite failed
        if: always()
        run: |
          if [ "${{ steps.isolation.outcome }}" != "success" ] || [ "${{ steps.email.outcome }}" != "success" ]; then
            echo "::error::One or more isolation/email E2E suites failed"
            exit 1
          fi
