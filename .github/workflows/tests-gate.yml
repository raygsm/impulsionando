name: Tests Gate

# Bloqueia merges/publicações quando qualquer teste da suíte vitest falha.
# Marcar como required status check em Settings → Branches → main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Vitest full suite (456/456 must pass)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full vitest suite (JSON + JUnit)
        id: vitest
        run: |
          mkdir -p test-results
          bunx vitest run \
            --reporter=default \
            --reporter=json --outputFile=test-results/vitest.json \
            --reporter=junit --outputFile=test-results/vitest.junit.xml \
            2>&1 | tee test-results/vitest.log

      - name: Append run to quality history
        if: always()
        run: |
          node scripts/append-quality-history.mjs test-results/vitest.json \
            > public/qa-history.json.next && mv public/qa-history.json.next public/qa-history.json || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: test-results/

      - name: Fail job if any test failed
        if: always() && steps.vitest.outcome != 'success'
        run: exit 1
