name: Apply Supabase Migrations

on:
  workflow_dispatch:

concurrency:
  group: apply-supabase-migrations
  cancel-in-progress: false

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      PGDATABASE: ${{ secrets.PGDATABASE }}
      SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST || vars.SUPABASE_POOLER_HOST }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Normalize Supabase target from repo config
        run: |
          PROJECT_ID="$(node -e "const fs=require('fs'); const m=fs.readFileSync('supabase/config.toml','utf8').match(/^\s*project_id\s*=\s*\"([^\"]+)\"/m); if(!m) process.exit(1); process.stdout.write(m[1]);")"
          {
            echo "SUPABASE_PROJECT_ID=$PROJECT_ID"
            echo "VITE_SUPABASE_PROJECT_ID=$PROJECT_ID"
            echo "SUPABASE_URL=https://$PROJECT_ID.supabase.co"
            echo "VITE_SUPABASE_URL=https://$PROJECT_ID.supabase.co"
          } >> "$GITHUB_ENV"

      - name: Normalize Supabase pooler credentials
        run: |
          PROJECT_ID="$(node -e "const fs=require('fs'); const m=fs.readFileSync('supabase/config.toml','utf8').match(/^\s*project_id\s*=\s*\"([^\"]+)\"/m); if(!m) process.exit(1); process.stdout.write(m[1]);")"
          POOLER_HOST="${SUPABASE_POOLER_HOST:-$PGHOST}"
          if [ -z "$POOLER_HOST" ] || [[ "$POOLER_HOST" != *".pooler.supabase.com" ]]; then
            if [ "$PROJECT_ID" = "arygtqrdpcdkwnuwsgmm" ]; then
              POOLER_HOST="aws-0-us-east-2.pooler.supabase.com"
            fi
          fi
          {
            echo "PGHOST=$POOLER_HOST"
            echo "PGPORT=6543"
            echo "PGUSER=postgres.$PROJECT_ID"
            echo "PGDATABASE=postgres"
          } >> "$GITHUB_ENV"

      - name: Verify Supabase target
        run: node scripts/verify-supabase-target.mjs

      - name: Verify Supabase pooler connection
        run: node scripts/verify-supabase-pooler.mjs

      - name: Apply migrations
        run: |
          supabase db push --include-all --db-url "postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}"
